<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="3D visualization of RFC documents and their relationships." />
  <link rel="preload" href="https://raw.githubusercontent.com/h-ssiqueira/Architecture_Coding_Standards/refs/heads/data/graph_data.json" as="fetch" crossorigin>
  <link rel="preload" href="https://unpkg.com/3d-force-graph" as="fetch" crossorigin>

  <title>RFCs</title>
  <style>
    body { margin: 0; background-color: #101020; }
    canvas { display: block; }
    .search-container {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
    }

    #search {
      padding: 6px;
      margin-right: 4px;
    }

    button {
      padding: 6px;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      color: #ddd;
      font-size: 13px;
    }

    .switch {
      position: relative;
      width: 42px;
      height: 22px;
      margin-left: 8px;
    }

    .switch input { display: none; }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #444;
      border-radius: 22px;
      transition: .2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 18px; width: 18px;
      left: 2px; top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: .2s;
    }

    input:checked + .slider {
      background-color: #2a8fbd;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #101020;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: opacity .4s ease;
    }
    
    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    
    .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,.1);
      border-top-color: #2a8fbd;
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }
    
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
    .loading-text {
      color: #888;
      font-size: 13px;
      font-family: sans-serif;
    }
    .loading-error {
      color: #e07070;
      font-size: 12px;
      font-family: sans-serif;
      display: none;
    }

    #sidebar {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 20;
      width: 250px;
      background: rgba(18, 18, 36, 0.92);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      font-family: sans-serif;
      font-size: 13px;
      color: #ddd;
      overflow: hidden;
      transform: translateX(270px);
      opacity: 0;
      transition: transform .25s ease, opacity .2s ease;
    }

    #sidebar.open {
      transform: translateX(0);
      opacity: 1;
    }

    .sb-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sb-rfc-id {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      color: #2a8fbd;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .sb-title {
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
    }

    .sb-close {
      font-size: 18px;
      color: #666;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .sb-close:hover {
      color: #ddd;
    }

    .sb-body {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .sb-key {
      color: #666;
      font-size: 11px;
    }
    
    .sb-val {
      color: #bbb;
      font-size: 11px;
      text-align: right;
    }

    .sb-status {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: .04em;
    }
    
    .sb-divider {
      height: 1px;
      background: rgba(255,255,255,.07);
      margin: 2px 0;
    }
    
    .sb-visit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin-top: 2px;
      padding: 7px;
      background: rgba(42,143,189,.15);
      border: 1px solid rgba(42,143,189,.35);
      border-radius: 7px;
      color: #7bbfe0;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, color .15s;
      font-family: sans-serif;
    }

    .sb-visit:hover {
      background: rgba(42,143,189,.28);
      color: #aaddf5;
    }

    #legend {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(18, 18, 36, 0.88);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 9px;
      padding: 10px 13px;
      font-family: sans-serif;
      font-size: 11px;
      color: #999;
      backdrop-filter: blur(8px);
      transition: opacity .2s, transform .2s;
    }

    #legend.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
    }
    
    .leg-heading {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #555;
      margin-bottom: 6px;
    }
    
    .leg-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 3px 0;
      color: #888;
    }
    
    .leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    
    .leg-section {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #444;
      margin: 7px 0 3px;
    }
  </style>
  <link rel="icon" href="https://www.rfc-editor.org/wp-content/uploads/favicon-1.ico" sizes="32x32">
  <link rel="icon" href="https://www.rfc-editor.org/wp-content/uploads/favicon-1.ico" sizes="192x192">
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner" id="spinner"></div>
    <div class="loading-text">Loading RFC graph data…</div>
    <div class="loading-error" id="loading-error"></div>
  </div>

  <div class="search-container">
    <input id="search" placeholder="Enter RFC code..." />
    <button onclick="findNode()">Find</button>

    <label class="toggle" title="Enable node/link hover highlighting">
      Hover animation
      <span class="switch">
        <input id="hover-toggle" type="checkbox" />
        <span class="slider"></span>
      </span>
    </label>

    <label class="toggle" title="Show/hide legend" style="margin-left:12px">
      Legend
      <span class="switch">
        <input id="legend-toggle" type="checkbox" checked />
        <span class="slider"></span>
      </span>
    </label>
  </div>

  <div id="sidebar">
    <div class="sb-header">
      <div>
        <div class="sb-rfc-id" id="sb-id"></div>
        <div class="sb-title" id="sb-title"></div>
      </div>
      <span class="sb-close" onclick="closeSidebar()" title="Close">×</span>
    </div>
    <div class="sb-body">
      <div class="sb-row">
        <span class="sb-key">Date</span>
        <span class="sb-val" id="sb-date">—</span>
      </div>
      <div class="sb-row">
        <span class="sb-key">Status</span>
        <span id="sb-status" class="sb-status"></span>
      </div>
      <div class="sb-row">
        <span class="sb-key">Connections</span>
        <span class="sb-val" id="sb-links">—</span>
      </div>
      <div class="sb-divider"></div>
      <a class="sb-visit" id="sb-visit" href="#" target="_blank" rel="noopener">
        ↗ Open on rfc-editor.org
      </a>
    </div>
  </div>

  <div id="legend">
    <div class="leg-heading">Legend</div>
    <div class="leg-section">Color → Status</div>
    <div class="leg-row"><div class="leg-dot" style="background:#50c878"></div>Proposed Standard</div>
    <div class="leg-row"><div class="leg-dot" style="background:#80b0ff"></div>Best Current Practice</div>
    <div class="leg-row"><div class="leg-dot" style="background:#c090ff"></div>Informational</div>
    <div class="leg-row"><div class="leg-dot" style="background:#e09050"></div>Obsolete</div>
    <div class="leg-row"><div class="leg-dot" style="background:#e07070"></div>Experimental</div>
    <div class="leg-row"><div class="leg-dot" style="background:#888"></div>Other / Unknown</div>
  </div>

  <div id="3d-graph"></div>

  <script src="https://unpkg.com/3d-force-graph"></script>

  <script>
    let graph;
    const highlightNodes = new Set();
    const highlightLinks = new Set();
    let hoverNode = null;
    let hoverEnabled = false;

    const hoverToggle = document.getElementById('hover-toggle');
    hoverToggle.addEventListener('change', e => {
      hoverEnabled = e.target.checked;
      if (!hoverEnabled) {
        highlightNodes.clear();
        highlightLinks.clear();
        hoverNode = null;
        if (graph) graph.refresh();
      }
    });

    document.getElementById('legend-toggle').addEventListener('change', e => {
      document.getElementById('legend').classList.toggle('hidden', !e.target.checked);
    });

    function extractRfcNum(id) {
      if (!id) return null;
      const m = id.match(/RFC[\s\u00a0]*(\d+)/i);
      return m ? m[1] : null;
    }

    function findNode() {
      const raw = document.getElementById('search').value.trim();
      if (!graph || !raw) return;

      const num = raw.replace(/RFC[\s\u00a0]*/i, '').trim();
      if (!num) { alert('Enter a numeric RFC number.'); return; }

      const node = graph.graphData().nodes.find(n => extractRfcNum(n.id) === num);

      if (node) {
        graph.cameraPosition(
          { x: node.x * 1.1, y: node.y * 1.1, z: node.z * 1.1 },
          node,
          500
        );
      } else {
        alert(`RFC ${num} not found.`);
      }
    }

    function statusColor(status) {
      if (!status) return '#888';
      const s = status.toLowerCase();
      if (s.includes('proposed standard') || s.includes('internet standard')) return '#50c878';
      if (s.includes('best current')) return '#80b0ff';
      if (s.includes('informational')) return '#c090ff';
      if (s.includes('obsolete')) return '#e09050';
      if (s.includes('experimental')) return '#e07070';
      if (s.includes('historic')) return '#b07050';
      return '#888';
    }

    function openSidebar(node) {
      const num = extractRfcNum(node.id);
      document.getElementById('sb-id').textContent = num ? `RFC ${num}` : node.id;
      document.getElementById('sb-title').textContent = node.title || '(no title)';
      document.getElementById('sb-date').textContent = node.date || '—';

      const statusEl = document.getElementById('sb-status');
      statusEl.textContent = node.status || '—';
      statusEl.style.background = statusColor(node.status) + '22';
      statusEl.style.color = statusColor(node.status);
      statusEl.style.border = '1px solid ' + statusColor(node.status) + '55';

      const count = (node.links || []).length;
      document.getElementById('sb-links').textContent = count ? `${count} connection${count !== 1 ? 's' : ''}` : 'none';

      const url = num ? `https://www.rfc-editor.org/rfc/rfc${num}` : '#';
      document.getElementById('sb-visit').href = url;

      document.getElementById('sidebar').classList.add('open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSidebar();
    });

    fetch('https://raw.githubusercontent.com/h-ssiqueira/Architecture_Coding_Standards/refs/heads/data/graph_data.json')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(raw => {
        const nodeById = {};
        raw.nodes.forEach(node => { nodeById[node.id] = node; });

        const data = { nodes: raw.nodes, links: raw.edges };

        data.links.forEach(link => {
          const a = nodeById[link.source];
          const b = nodeById[link.target];
          if (!a || !b) return;

          !a.neighbors && (a.neighbors = []);
          !b.neighbors && (b.neighbors = []);
          a.neighbors.push(b);
          b.neighbors.push(a);

          !a.links && (a.links = []);
          !b.links && (b.links = []);
          a.links.push(link);
          b.links.push(link);
        });

        graph = ForceGraph3D({ forceEngine: 'ngraph' })(document.getElementById('3d-graph'))
          .graphData(data)
          .nodeLabel(node => node._label || (`${node.id} - ${node.title}\nDate: ${node.date}\nStatus: ${node.status}`))
          .nodeColor(node => highlightNodes.has(node) ? node === hoverNode ? 'rgb(255,0,0,1)' : 'rgba(255,160,0,0.8)' : (node.color || statusColor(node.status)))
          .nodeVal(node => Math.min(node.size || 5, 20))
          .nodeResolution(16)
          .linkDirectionalArrowLength(link => highlightLinks.has(link) ? 3 : 0)
          .linkDirectionalParticles(link => highlightLinks.has(link) ? 2 : 0)
          .linkColor(() => '#ccc')
          .linkResolution(8)
          .backgroundColor('#101020')
          .onNodeClick(node => { openSidebar(node); })
          .linkWidth(link => highlightLinks.has(link) ? 4 : 1)
          .linkDirectionalParticleWidth(4);

        graph.onNodeHover(node => {
          if (!hoverEnabled) {
            if (hoverNode || highlightNodes.size || highlightLinks.size) {
              highlightNodes.clear();
              highlightLinks.clear();
              hoverNode = null;
              graph.refresh();
            }
            return;
          }

          if ((!node && !highlightNodes.size) || (node && hoverNode === node)) return;

          highlightNodes.clear();
          highlightLinks.clear();
          if (node) {
            highlightNodes.add(node);
            (node.neighbors || []).forEach(neighbor => highlightNodes.add(neighbor));
            (node.links || []).forEach(l => highlightLinks.add(l));
          }

          hoverNode = node || null;
          graph.refresh();
        });

        graph.onLinkHover(link => {
          if (!hoverEnabled) {
            if (highlightNodes.size || highlightLinks.size) {
              highlightNodes.clear();
              highlightLinks.clear();
              graph.refresh();
            }
            return;
          }

          highlightNodes.clear();
          highlightLinks.clear();

          if (link) {
            highlightLinks.add(link);
            highlightNodes.add(link.source);
            highlightNodes.add(link.target);
          }

          graph.refresh();
        });

        graph.d3Force('charge').strength(-10);
        graph.d3VelocityDecay(0.2);

        setTimeout(() => {
          graph.d3Force('charge', null);
          graph.d3Force('link', null);
        }, 5000);

        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('fade-out');
        setTimeout(() => { overlay.style.display = 'none'; }, 500);
      })
      .catch(err => {
        console.error('Failed to load graph data:', err);
        document.getElementById('spinner').style.display = 'none';
        const errEl = document.getElementById('loading-error');
        errEl.textContent = 'Failed to load graph data: ' + (err.message || 'unknown error');
        errEl.style.display = 'block';
        document.querySelector('.loading-text').textContent = 'Something went wrong';
      });

    document.getElementById('search').addEventListener('keydown', function(event) {
      if (event.key === 'Enter') {
        findNode();
      }
    });

    window.addEventListener('pagehide', () => {
      if (graph) {
        try {
          graph.renderer().dispose();
        } catch (e) {
          console.warn("Cleanup failed", e);
        }
      }
    });
  </script>
</body>
</html>
