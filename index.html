<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="3D visualization of RFC documents and their relationships." />
  <link rel="preload" href="https://raw.githubusercontent.com/h-ssiqueira/Architecture_Coding_Standards/refs/heads/data/graph_data.json" as="fetch" crossorigin>
  <link rel="preload" href="https://unpkg.com/3d-force-graph" as="fetch" crossorigin>

  <title>RFCs</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #101020;
      overflow: hidden;
    }

    #3d-graph {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .search-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      padding-top: max(10px, env(safe-area-inset-top));
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      background: rgba(16, 16, 32, 0.88);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    #search {
      flex: 1;
      min-width: 120px;
      padding: 7px 10px;
      font-size: 16px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 7px;
      color: #ddd;
      outline: none;
      transition: border-color .15s;
    }

    #search:focus {
      border-color: rgba(42,143,189,.55);
    }

    #search::placeholder {
      color: #555;
    }

    button {
      padding: 7px 14px;
      font-size: 13px;
      background: rgba(42,143,189,.2);
      border: 1px solid rgba(42,143,189,.4);
      border-radius: 7px;
      color: #7bbfe0;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }

    button:hover {
      background: rgba(42,143,189,.35);
    }
    
    button:active {
      background: rgba(42,143,189,.5);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      color: #aaa;
      font-size: 12px;
      font-family: sans-serif;
      white-space: nowrap;
      gap: 6px;
    }

    .switch {
      position: relative;
      width: 38px;
      height: 20px;
      flex-shrink: 0;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #444;
      border-radius: 20px;
      transition: background .2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }

    input:checked + .slider {
      background-color: #2a8fbd;
    }
    
    input:checked + .slider:before {
      transform: translateX(18px);
    }

    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      z-index: 100;
      background: rgba(30,30,50,.96);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 9px;
      color: #ddd;
      font-family: sans-serif;
      font-size: 13px;
      padding: 10px 18px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s, transform .2s;
      backdrop-filter: blur(8px);
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #101020;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: opacity .4s ease;
    }

    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 2px solid rgba(255,255,255,.1);
      border-top-color: #2a8fbd;
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      color: #888;
      font-size: 13px;
      font-family: sans-serif;
    }

    .loading-error {
      color: #e07070;
      font-size: 12px;
      font-family: sans-serif;
      display: none;
      text-align: center;
      padding: 0 20px;
    }

    #sidebar {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 20;
      width: 260px;
      background: rgba(18, 18, 36, 0.95);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-family: sans-serif;
      font-size: 13px;
      color: #ddd;
      overflow: hidden;
      transform: translateX(290px);
      opacity: 0;
      transition: transform .25s ease, opacity .2s ease;
      will-change: transform;
    }

    #sidebar.open {
      transform: translateX(0);
      opacity: 1;
    }

    .sb-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .sb-rfc-id {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      color: #2a8fbd;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .sb-title {
      font-size: 12px;
      color: #ccc;
      line-height: 1.4;
    }

    .sb-close {
      font-size: 20px;
      color: #555;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      margin-left: 8px;
      user-select: none;
    }

    .sb-close:hover {
      color: #ddd;
    }

    .sb-body {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sb-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .sb-key {
      color: #666;
      font-size: 11px;
    }
    
    .sb-val {
      color: #bbb;
      font-size: 11px;
      text-align: right;
    }

    .sb-status {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: .04em;
    }

    .sb-divider {
      height: 1px;
      background: rgba(255,255,255,.07);
      margin: 2px 0;
    }

    .sb-visit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin-top: 2px;
      padding: 8px;
      background: rgba(42,143,189,.15);
      border: 1px solid rgba(42,143,189,.35);
      border-radius: 7px;
      color: #7bbfe0;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, color .15s;
      font-family: sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .sb-visit:hover {
      background: rgba(42,143,189,.28);
      color: #aaddf5;
    }

    #legend {
      position: fixed;
      bottom: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(18, 18, 36, 0.88);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 9px;
      padding: 10px 13px;
      font-family: sans-serif;
      font-size: 11px;
      color: #999;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: opacity .2s, transform .2s;
    }

    #legend.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(6px);
    }

    .leg-heading {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #555;
      margin-bottom: 6px;
    }

    .leg-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 3px 0;
      color: #888;
    }

    .leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .leg-section {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #444;
      margin: 7px 0 3px;
    }

    @media (max-width: 600px) {

      #sidebar {
        top: auto;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100%;
        border-radius: 14px 14px 0 0;
        border: none;
        border-top: 1px solid rgba(255,255,255,.12);
        transform: translateY(100%);
        opacity: 1;
        max-height: 65vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }

      #sidebar.open {
        transform: translateY(0);
        opacity: 1;
      }

      #sidebar::before {
        content: '';
        display: block;
        width: 36px;
        height: 4px;
        background: rgba(255,255,255,.18);
        border-radius: 2px;
        margin: 10px auto 4px;
      }

      .sb-header {
        padding: 10px 16px 10px;
      }
      
      .sb-title  {
        font-size: 13px;
      }
      
      .sb-rfc-id {
        font-size: 11px;
      }

      #legend {
        bottom: 0;
        left: 0;
        right: 0;
        border-radius: 0;
        border: none;
        border-top: 1px solid rgba(255,255,255,.07);
        padding: 7px 14px;
        padding-bottom: max(7px, env(safe-area-inset-bottom));
        display: flex;
        flex-wrap: wrap;
        gap: 2px 12px;
        align-items: center;
      }

      #legend.hidden {
        transform: translateY(100%);
        opacity: 0;
      }

      #legend.sidebar-open {
        opacity: 0;
        pointer-events: none;
        transform: translateY(100%);
      }

      .leg-heading {
        flex-basis: 100%;
        margin-bottom: 2px;
        font-size: 9px;
      }

      .leg-section {
        flex-basis: 100%;
        margin: 3px 0 1px;
      }

      .leg-row { font-size: 10px; }

      #toast { bottom: 56px; }
    }

    @media (max-width: 380px) {
      .toggle  { font-size: 11px; }
      .switch  { width: 34px; height: 18px; }
      .slider:before { height: 14px; width: 14px; }
    }
  </style>
  <link rel="icon" href="https://www.rfc-editor.org/wp-content/uploads/favicon-1.ico" sizes="32x32">
</head>
<body>

  <div id="loading-overlay">
    <div class="spinner" id="spinner"></div>
    <div class="loading-text">Loading RFC graph data…</div>
    <div class="loading-error" id="loading-error"></div>
  </div>

  <div class="search-container">
    <input id="search" placeholder="Enter RFC number…" inputmode="numeric" />
    <button onclick="findNode()">Find</button>

    <label class="toggle" title="Enable node/link hover highlighting">
      Hover
      <span class="switch">
        <input id="hover-toggle" type="checkbox" />
        <span class="slider"></span>
      </span>
    </label>

    <label class="toggle" title="Show/hide legend" style="margin-left:4px">
      Legend
      <span class="switch">
        <input id="legend-toggle" type="checkbox" checked />
        <span class="slider"></span>
      </span>
    </label>
  </div>

  <div id="sidebar">
    <div class="sb-header">
      <div>
        <div class="sb-rfc-id" id="sb-id"></div>
        <div class="sb-title" id="sb-title"></div>
      </div>
      <span class="sb-close" onclick="closeSidebar()" title="Close">×</span>
    </div>
    <div class="sb-body">
      <div class="sb-row">
        <span class="sb-key">Date</span>
        <span class="sb-val" id="sb-date">—</span>
      </div>
      <div class="sb-row">
        <span class="sb-key">Status</span>
        <span id="sb-status" class="sb-status"></span>
      </div>
      <div class="sb-row">
        <span class="sb-key">Connections</span>
        <span class="sb-val" id="sb-links">—</span>
      </div>
      <div class="sb-divider"></div>
      <a class="sb-visit" id="sb-visit" href="#" target="_blank" rel="noopener">
        ↗ Open on rfc-editor.org
      </a>
    </div>
  </div>

  <div id="legend">
    <div class="leg-heading">Legend</div>
    <div class="leg-section">Color → Status</div>
    <div class="leg-row"><div class="leg-dot" style="background:#50c878"></div>Proposed Standard</div>
    <div class="leg-row"><div class="leg-dot" style="background:#80b0ff"></div>Best Current Practice</div>
    <div class="leg-row"><div class="leg-dot" style="background:#c090ff"></div>Informational</div>
    <div class="leg-row"><div class="leg-dot" style="background:#e09050"></div>Obsolete</div>
    <div class="leg-row"><div class="leg-dot" style="background:#e07070"></div>Experimental</div>
    <div class="leg-row"><div class="leg-dot" style="background:#888"></div>Other / Unknown</div>
  </div>

  <div id="toast"></div>

  <div id="3d-graph"></div>

  <script src="https://unpkg.com/3d-force-graph"></script>
  <script>
    let toastTimer;
    function showToast(msg, duration = 2800) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), duration);
    }

    let graph;
    const highlightNodes = new Set();
    const highlightLinks = new Set();
    let hoverNode = null;
    let hoverEnabled = false;
    const isMobile = () => window.innerWidth <= 600;

    document.getElementById('hover-toggle').addEventListener('change', e => {
      hoverEnabled = e.target.checked;
      if (!hoverEnabled) {
        highlightNodes.clear();
        highlightLinks.clear();
        hoverNode = null;
        if (graph) graph.refresh();
      }
    });

    document.getElementById('legend-toggle').addEventListener('change', e => {
      document.getElementById('legend').classList.toggle('hidden', !e.target.checked);
    });

    function extractRfcNum(id) {
      if (!id) return null;
      const m = id.match(/RFC[\s\u00a0]*(\d+)/i);
      return m ? m[1] : null;
    }

    function statusColor(status) {
      if (!status) return '#888';
      const s = status.toLowerCase();
      if (s.includes('proposed standard') || s.includes('internet standard')) return '#50c878';
      if (s.includes('best current')) return '#80b0ff';
      if (s.includes('informational')) return '#c090ff';
      if (s.includes('obsolete')) return '#e09050';
      if (s.includes('experimental')) return '#e07070';
      if (s.includes('historic')) return '#b07050';
      return '#888';
    }

    function openSidebar(node) {
      const num = extractRfcNum(node.id);
      document.getElementById('sb-id').textContent = num ? `RFC ${num}` : node.id;
      document.getElementById('sb-title').textContent = node.title || '(no title)';
      document.getElementById('sb-date').textContent = node.date || '—';

      const statusEl = document.getElementById('sb-status');
      statusEl.textContent = node.status || '—';
      const sc = statusColor(node.status);
      statusEl.style.background = sc + '22';
      statusEl.style.color = sc;
      statusEl.style.border = '1px solid ' + sc + '55';

      const count = (node.links || []).length;
      document.getElementById('sb-links').textContent =
        count ? `${count} connection${count !== 1 ? 's' : ''}` : 'none';

      const url = num ? `https://www.rfc-editor.org/rfc/rfc${num}` : '#';
      document.getElementById('sb-visit').href = url;

      const sidebar = document.getElementById('sidebar');
      sidebar.style.transform = '';
      sidebar.style.transition = '';
      sidebar.classList.add('open');

      if (isMobile()) {
        document.getElementById('legend').classList.add('sidebar-open');
      }
    }

    function closeSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.style.transform = '';
      sidebar.classList.remove('open');
      document.getElementById('legend').classList.remove('sidebar-open');
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeSidebar();
    });

    function findNode() {
      const raw = document.getElementById('search').value.trim();
      if (!graph || !raw) return;

      const num = raw.replace(/RFC[\s\u00a0]*/i, '').trim();
      if (!num || isNaN(num)) { showToast('Enter a numeric RFC number.'); return; }

      const node = graph.graphData().nodes.find(n => extractRfcNum(n.id) === num);

      if (node) {
        graph.cameraPosition(
          { x: node.x * 1.1, y: node.y * 1.1, z: node.z * 1.1 },
          node,
          500
        );
        openSidebar(node);
      } else {
        showToast(`RFC ${num} not found.`);
      }
    }

    fetch('https://raw.githubusercontent.com/h-ssiqueira/Architecture_Coding_Standards/refs/heads/data/graph_data.json')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.json();
      })
      .then(raw => {
        const nodeById = {};
        raw.nodes.forEach(node => { nodeById[node.id] = node; });

        const data = { nodes: raw.nodes, links: raw.edges };

        data.links.forEach(link => {
          const a = nodeById[link.source];
          const b = nodeById[link.target];
          if (!a || !b) return;
          !a.neighbors && (a.neighbors = []);
          !b.neighbors && (b.neighbors = []);
          a.neighbors.push(b);
          b.neighbors.push(a);
          !a.links && (a.links = []);
          !b.links && (b.links = []);
          a.links.push(link);
          b.links.push(link);
        });

        graph = ForceGraph3D({ forceEngine: 'ngraph' })(document.getElementById('3d-graph'))
          .graphData(data)
          .nodeLabel(node => `${node.id} - ${node.title}\nDate: ${node.date}\nStatus: ${node.status}`)
          .nodeColor(node =>
            highlightNodes.has(node)
              ? node === hoverNode ? 'rgb(255,0,0,1)' : 'rgba(255,160,0,0.8)'
              : (node.color || statusColor(node.status))
          )
          .nodeVal(node => Math.min(node.size || 5, 20))
          .nodeResolution(16)
          .linkDirectionalArrowLength(link => highlightLinks.has(link) ? 3 : 0)
          .linkDirectionalParticles(link => highlightLinks.has(link) ? 2 : 0)
          .linkColor(() => '#ccc')
          .linkResolution(8)
          .backgroundColor('#101020')
          .onNodeClick(node => { openSidebar(node); })
          .linkWidth(link => highlightLinks.has(link) ? 4 : 1)
          .linkDirectionalParticleWidth(4);

        graph.onNodeHover(node => {
          if (!hoverEnabled) {
            if (hoverNode || highlightNodes.size || highlightLinks.size) {
              highlightNodes.clear();
              highlightLinks.clear();
              hoverNode = null;
              graph.refresh();
            }
            return;
          }
          if ((!node && !highlightNodes.size) || (node && hoverNode === node)) return;
          highlightNodes.clear();
          highlightLinks.clear();
          if (node) {
            highlightNodes.add(node);
            (node.neighbors || []).forEach(n => highlightNodes.add(n));
            (node.links || []).forEach(l => highlightLinks.add(l));
          }
          hoverNode = node || null;
          graph.refresh();
        });

        graph.onLinkHover(link => {
          if (!hoverEnabled) {
            if (highlightNodes.size || highlightLinks.size) {
              highlightNodes.clear();
              highlightLinks.clear();
              graph.refresh();
            }
            return;
          }
          highlightNodes.clear();
          highlightLinks.clear();
          if (link) {
            highlightLinks.add(link);
            highlightNodes.add(link.source);
            highlightNodes.add(link.target);
          }
          graph.refresh();
        });

        graph.d3Force('charge').strength(-10);
        graph.d3VelocityDecay(0.2);

        setTimeout(() => {
          graph.d3Force('charge', null);
          graph.d3Force('link', null);
        }, 5000);

        const overlay = document.getElementById('loading-overlay');
        overlay.classList.add('fade-out');
        setTimeout(() => { overlay.style.display = 'none'; }, 500);
      })
      .catch(err => {
        console.error('Failed to load graph data:', err);
        document.getElementById('spinner').style.display = 'none';
        const errEl = document.getElementById('loading-error');
        errEl.textContent = 'Failed to load: ' + (err.message || 'unknown error');
        errEl.style.display = 'block';
        document.querySelector('.loading-text').textContent = 'Something went wrong.';
      });

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') findNode();
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (graph) graph.width(window.innerWidth).height(window.innerHeight);
      }, 200);
    });

    window.addEventListener('pagehide', () => {
      if (graph) {
        try { graph.renderer().dispose(); } catch (e) { console.warn('Cleanup failed', e); }
      }
    });

    (function () {
      const sidebar = document.getElementById('sidebar');
      let startY = 0;
      let isDragging = false;

      sidebar.addEventListener('touchstart', e => {
        startY = e.touches[0].clientY;
        isDragging = true;
      }, { passive: true });

      sidebar.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const dy = e.touches[0].clientY - startY;
        if (dy > 0) {
          sidebar.style.transition = 'none';
          sidebar.style.transform = `translateY(${dy}px)`;
        }
      }, { passive: true });

      sidebar.addEventListener('touchend', e => {
        if (!isDragging) return;
        isDragging = false;
        const dy = e.changedTouches[0].clientY - startY;
        sidebar.style.transition = '';
        if (dy > 80) {
          sidebar.style.transform = '';
          closeSidebar();
        } else {
          sidebar.style.transform = '';
        }
      }, { passive: true });
    })();
  </script>
</body>
</html>
